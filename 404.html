<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>GPS Belgrano</title>
    <script type="text/javascript">
      // SPA fallback para GitHub Pages (single-page-apps-for-github-pages).
      // Mantiene 1 segmento de ruta (/gps-belgrano/) y redirige preservando el path.
      var pathSegmentsToKeep = 1
      var l = window.location
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash,
      )
    </script>
  </head>
  <body></body>
</html>
